name: Run Adobe to BigQuery ETL

on:
  workflow_dispatch: # Allows manual trigger from the GitHub UI
  # schedule:
  #   - cron: '0 2 * * *' # Uncomment to run automatically at 2:00 AM UTC every day

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Run ETL Pipeline
        env:
          ADOBE_CLIENT_ID: ${{ secrets.ADOBE_CLIENT_ID }}
          ADOBE_CLIENT_SECRET: ${{ secrets.ADOBE_CLIENT_SECRET }}
          ADOBE_ORG_ID: ${{ secrets.ADOBE_ORG_ID }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          # Create a minimal config.json from environment variables or a predefined template
          # For a production setup, you might want to dynamically generate this or check it in securely.
          cp config.example.json config.json
          
          echo "Starting ETL Process..."
          python tools/main.py --config config.json
